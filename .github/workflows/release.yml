name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build Binaries
        run: make build-all

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/ft-linux-amd64
            bin/ft-darwin-amd64
            bin/ft-windows-amd64.exe
          generate_release_notes: true
